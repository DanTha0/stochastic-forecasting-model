# Outline-only configuration file (YAML).
# This file should not contain secrets. Use `.env` for API keys.
#
# Primary research data: Yahoo Finance via yfinance (no API key; good historical OHLCV).
# Traydner remains available in fetch_data.TraydnerAPI for prices / simulated trading.
data:
  provider: yahoo
  interval: "1d"          # yfinance: 1m, 2m, 5m, 60m, 1h, 1d, 1wk, 1mo
  start: "2017-01-01"
  end: null               # null = up to today
  symbols:
    - SPY
    - AAPL
  # Traydner (optional; used when provider: traydner)
  resolution: "1d"
  history_limit: 5000

# Preprocessing configuration
preprocess:
  return_type: log        # log or arithmetic (for primary return column)
  price_for_returns: adj_close  # adj_close | close — adj_close recommended for equities
  dropna: true
  timezone: "America/New_York"  # localize daily bars for consistency (Yahoo is date-only UTC)
  drop_invalid_bars: true       # rows where OHLC relationships break
  drop_zero_volume: false       # if true, drop rows with volume == 0
  winsorize_returns: false    # if true, clip return quantiles (reduces single-day glitch impact)
  winsorize_quantiles: [0.001, 0.999]
  vol_windows: [5, 10, 21]      # rolling std windows (in bars) on returns
  ohlc_vol_window: 20          # window for Parkinson / Garman-Klass / Rogers-Satchell
  annualization: 252            # trading days per year for scaling volatility
  train_frac: 0.70
  val_frac: 0.15
  # remainder goes to test; set val_frac: 0 for train/test only

# Feature engineering configuration
features:
  lags:
    - 1
    - 2
    - 5
  rolling_windows:
    - 10
    - 20
    - 50

# Volatility model configuration
volatility:
  model: garch
  garch:
    p: 1
    q: 1
    dist: studentst      # outline: normal / studentst
    refit_every: 20      # bars
    train_window: 500    # bars

# Markov/regime configuration
regimes:
  method: observable_markov
  observable_markov:
    series: realized_vol
    n_states: 3
    labeling: quantiles

# Monte Carlo configuration
monte_carlo:
  horizon: 5
  n_paths: 10000
  seed: 123
  process: regime_garch  # outline: gbm / garch / regime_garch

# Signal generation configuration
signals:
  method: prob_threshold
  prob_threshold:
    horizon: 5
    long_if_prob_up_gt: 0.60
    short_if_prob_up_lt: 0.40

# Risk/position sizing configuration
risk:
  method: vol_target
  vol_target:
    target_annual_vol: 0.15
    max_leverage: 1.0

# Backtest configuration
backtest:
  initial_cash: 100000
  commission_bps: 1.0
  slippage_bps: 2.0
  execution: next_bar
